# .github/workflows/upstream-sync.yml
# Requires a PAT with repo + workflow + pull-requests scopes stored as SYNC_PAT secret.
#
# Weekly sync of upstream documenso/documenso into our fork.
#
# Behavior:
#   - main always force-resets to upstream/main (mirror branch)
#   - act-custom gets upstream/main merged in:
#       * clean merge or only .po conflicts -> auto-resolve and push directly
#       * real conflicts -> push to sync/upstream-<date> and open a PR with
#         conflict markers for human review. The PR description lists the
#         conflicted files so the reviewer knows exactly what to fix.
name: Sync upstream changes
on:
  schedule:
    - cron: '0 2 * * 1' # every Monday 2 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: https://github.com/documenso/documenso.git
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  REBASE_BRANCH: act-custom

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}
          fetch-depth: 0
          ref: act-custom

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Register the `ours` merge driver so .gitattributes entries that mark
          # stubbed workflow files with `merge=ours` actually take effect. Without
          # this registration the driver name is unknown and git falls back to
          # default text merging, which would re-introduce upstream's content.
          git config merge.ours.driver true

      - name: Add upstream remote
        run: |
          set -euo pipefail
          git remote add upstream "${UPSTREAM_REPO}" 2>/dev/null || \
            git remote set-url upstream "${UPSTREAM_REPO}"
          git fetch upstream
          git fetch origin

      - name: Reset main to upstream
        run: |
          set -euo pipefail
          git checkout -B "$TARGET_BRANCH" "upstream/$UPSTREAM_BRANCH"
          git push origin "$TARGET_BRANCH" --force

      - name: Merge upstream into act-custom
        id: merge
        run: |
          set -euo pipefail
          git checkout -B "$REBASE_BRANCH" "origin/$REBASE_BRANCH"

          # Merge (not rebase): act-custom already contains previous upstream
          # merge commits, so a rebase would replay those old upstream commits
          # onto the new upstream/main and produce add/add conflicts on files
          # that already exist there.
          if git merge "upstream/$UPSTREAM_BRANCH" --no-edit; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Merge conflict detected. Attempting auto-resolution for translation catalogs."
          mapfile -t conflicted_files < <(git diff --name-only --diff-filter=U)

          if [ "${#conflicted_files[@]}" -eq 0 ]; then
            echo "Merge failed but no conflicted files detected."
            git merge --abort
            echo "status=error" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          unresolved=()
          for file in "${conflicted_files[@]}"; do
            if [[ "$file" =~ ^packages/lib/translations/.+/web\.po$ ]]; then
              git checkout --theirs "$file"
              git add "$file"
            else
              unresolved+=("$file")
            fi
          done

          if [ "${#unresolved[@]}" -eq 0 ]; then
            git commit --no-edit
            echo "status=clean" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "${unresolved[@]}" > /tmp/sync-unresolved.txt
          echo "status=conflict" >> "$GITHUB_OUTPUT"
          echo "Unresolved conflicts in:"
          printf '  - %s\n' "${unresolved[@]}"

          # Stage the conflicted files (still containing conflict markers) and
          # commit so they can be pushed as a PR branch for human review.
          for file in "${unresolved[@]}"; do
            git add "$file"
          done

          {
            echo "WIP: merge upstream/main into act-custom (conflicts pending review)"
            echo
            echo "Unresolved conflicts:"
            printf -- '- %s\n' "${unresolved[@]}"
          } > /tmp/sync-commit-msg.txt
          git commit -F /tmp/sync-commit-msg.txt

      - name: Push clean merge to act-custom
        if: steps.merge.outputs.status == 'clean'
        run: |
          set -euo pipefail
          git push origin "$REBASE_BRANCH"

      - name: Push conflict branch and open PR
        if: steps.merge.outputs.status == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          SYNC_BRANCH="sync/upstream-${DATE}"
          git checkout -B "$SYNC_BRANCH"
          git push origin "$SYNC_BRANCH" --force-with-lease

          {
            echo "Automated weekly sync of \`upstream/main\` into \`act-custom\`."
            echo
            echo "**Translation \`.po\` conflicts were auto-resolved (took upstream).**"
            echo
            echo "**The following non-translation files have conflict markers that need human resolution:**"
            echo
            sed 's/^/- /' /tmp/sync-unresolved.txt
            echo
            echo "## How to resolve"
            echo
            echo "1. Check out this branch locally:"
            echo '   ```'
            echo "   git fetch origin"
            echo "   git checkout $SYNC_BRANCH"
            echo '   ```'
            echo "2. Resolve each file's conflict markers (\`<<<<<<<\`, \`=======\`, \`>>>>>>>\`)."
            echo "3. \`git add\` the resolved files, amend the commit, and push:"
            echo '   ```'
            echo "   git commit --amend --no-edit"
            echo "   git push origin $SYNC_BRANCH --force-with-lease"
            echo '   ```'
            echo "4. Merge this PR into \`act-custom\` (use **Merge commit**, not squash, to preserve upstream history)."
            echo
            echo "## Things to double-check for act-sizing impact"
            echo
            echo "- **\`/api/v2/envelope/*\` endpoints** (create/distribute/delete/GET) — signature changes will break act-sizing's Documenso integration in \`backend/lambda-db/projects_handler.py\`."
            echo "- **Webhook payload shape** (\`{event, payload, createdAt, webhookEndpoint}\` with \`payload.id\` and \`payload.externalId\`)."
            echo "- **PDF placeholder extraction** in \`packages/lib/server-only/pdf/auto-place-fields.ts\` — our \`{{signature, r1}}\` style placeholders depend on the regex \`/\\\\{\\\\{([^}]+)\\\\}\\\\}/g\`."
            echo "- **\`@documenso/embed-react\` package** — we use \`EmbedSignDocument\` for in-person signing."
          } > /tmp/sync-pr-body.md

          if gh pr list --head "$SYNC_BRANCH" --json number --jq 'length' | grep -q '^0$'; then
            gh pr create \
              --base "$REBASE_BRANCH" \
              --head "$SYNC_BRANCH" \
              --title "Weekly upstream sync ($DATE) — conflicts need review" \
              --body-file /tmp/sync-pr-body.md
          else
            echo "PR for $SYNC_BRANCH already exists; updated branch in place."
          fi
