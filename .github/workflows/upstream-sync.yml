# .github/workflows/upstream-sync.yml
name: Sync upstream changes
on:
  schedule:
    - cron: '0 2 * * 1' # every Monday 2 AM UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_REPO: https://github.com/documenso/documenso.git
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  REBASE_BRANCH: act-custom

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Add upstream remote
        run: |
          set -euo pipefail
          git remote add upstream "${UPSTREAM_REPO}" 2>/dev/null || \
            git remote set-url upstream "${UPSTREAM_REPO}"
          git fetch upstream
      - name: Merge upstream
        run: |
          set -euo pipefail
          git fetch origin
          git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          if ! git merge "upstream/$UPSTREAM_BRANCH" --no-edit; then
            echo "Merge conflict detected. Attempting auto-resolution for translation catalogs."

            mapfile -t conflicted_files < <(git diff --name-only --diff-filter=U)
            if [ "${#conflicted_files[@]}" -eq 0 ]; then
              echo "Merge failed but no conflicted files were detected."
              exit 1
            fi

            for file in "${conflicted_files[@]}"; do
              if [[ "$file" =~ ^packages/lib/translations/.+/web\.po$ ]]; then
                # For generated translation catalogs, prefer upstream content.
                git checkout --theirs "$file"
                git add "$file"
              else
                echo "Unresolvable conflict in non-translation file: $file"
                exit 1
              fi
            done

            git commit --no-edit
          fi
          git push origin "$TARGET_BRANCH"
      - name: Rebase custom branch
        if: ${{ env.REBASE_BRANCH != '' }}
        run: |
          set -euo pipefail
          git checkout -B "$REBASE_BRANCH" "origin/$REBASE_BRANCH"
          if ! git rebase "$TARGET_BRANCH"; then
            echo "Rebase conflict detected. Attempting auto-resolution for translation catalogs."

            while [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; do
              mapfile -t conflicted_files < <(git diff --name-only --diff-filter=U)
              if [ "${#conflicted_files[@]}" -eq 0 ]; then
                echo "Rebase failed but no conflicted files were detected."
                git rebase --abort
                exit 1
              fi

              for file in "${conflicted_files[@]}"; do
                if [[ "$file" =~ ^packages/lib/translations/.+/web\.po$ ]]; then
                  # For generated translation catalogs, prefer target branch content.
                  git checkout --theirs "$file"
                  git add "$file"
                else
                  echo "Unresolvable conflict in non-translation file: $file"
                  git rebase --abort
                  exit 1
                fi
              done

              git rebase --continue
            done
          fi
          git push origin "$REBASE_BRANCH" --force-with-lease
