# .github/workflows/upstream-sync.yml
name: Sync upstream changes
on:
  schedule:
    - cron: '0 2 * * 1' # every Monday 2 AM UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_REPO: https://github.com/documenso/documenso.git
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  REBASE_BRANCH: act-custom

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: act-custom
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Add upstream remote
        run: |
          set -euo pipefail
          git remote add upstream "${UPSTREAM_REPO}" 2>/dev/null || \
            git remote set-url upstream "${UPSTREAM_REPO}"
          git fetch upstream
          git fetch origin
      - name: Reset main to upstream
        run: |
          set -euo pipefail
          git checkout -B "$TARGET_BRANCH" "upstream/$UPSTREAM_BRANCH"
          git push origin "$TARGET_BRANCH" --force
      - name: Rebase custom branch
        if: ${{ env.REBASE_BRANCH != '' }}
        run: |
          set -euo pipefail
          git checkout -B "$REBASE_BRANCH" "origin/$REBASE_BRANCH"
          if ! git rebase "$TARGET_BRANCH"; then
            echo "Rebase conflict detected. Attempting auto-resolution for translation catalogs."

            while [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; do
              mapfile -t conflicted_files < <(git diff --name-only --diff-filter=U)
              if [ "${#conflicted_files[@]}" -eq 0 ]; then
                echo "Rebase failed but no conflicted files were detected."
                git rebase --abort
                exit 1
              fi

              all_resolvable=true
              for file in "${conflicted_files[@]}"; do
                if [[ "$file" =~ ^packages/lib/translations/.+/web\.po$ ]]; then
                  git checkout --theirs "$file"
                  git add "$file"
                else
                  echo "Unresolvable conflict in non-translation file: $file"
                  all_resolvable=false
                fi
              done

              if [ "$all_resolvable" = false ]; then
                git rebase --abort
                exit 1
              fi

              GIT_EDITOR=true git rebase --continue || true
            done
          fi
          git push origin "$REBASE_BRANCH" --force-with-lease
