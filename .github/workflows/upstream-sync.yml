# .github/workflows/upstream-sync.yml
name: Sync upstream changes
on:
  schedule:
    - cron: '0 2 * * 1' # every Monday 2 AM UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  UPSTREAM_REPO: https://github.com/documenso/documenso.git
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: main
  REBASE_BRANCH: act-custom

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Add upstream remote
        run: |
          set -euo pipefail
          git remote add upstream "${UPSTREAM_REPO}" 2>/dev/null || \
            git remote set-url upstream "${UPSTREAM_REPO}"
          git fetch upstream
      - name: Merge upstream
        run: |
          set -euo pipefail
          git fetch origin
          git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          git merge "upstream/$UPSTREAM_BRANCH" --no-edit
          git push origin "$TARGET_BRANCH"
      - name: Rebase custom branch
        if: ${{ env.REBASE_BRANCH != '' }}
        run: |
          set -euo pipefail
          git checkout -B "$REBASE_BRANCH" "origin/$REBASE_BRANCH"
          git rebase "$TARGET_BRANCH"
          git push origin "$REBASE_BRANCH" --force-with-lease
